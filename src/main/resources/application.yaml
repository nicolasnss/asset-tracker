spring:
  application:
    name: asset-tracker

  datasource:
    # Usamos o formato ${VARIAVEL:PADRAO}
    # Se o Windows não tiver a variável, ele usa o valor após os dois pontos
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asset_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:nico10}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${HIBERNATE_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration