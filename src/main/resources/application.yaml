spring:
  application:
    name: asset-tracker

  datasource:
    # A URL mantém um fallback para o padrão local, mas User e Password ficam protegidos
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asset_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      # Mudamos para 'none' temporariamente para o Flyway assumir o controle total
      ddl-auto: none
    show-sql: ${HIBERNATE_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        # Remova a linha do dialect, o Spring Boot 3 já detecta o Postgres 18 automaticamente

    flyway:
      enabled: true
      # ESSA É A CHAVE: Diz ao Flyway para aceitar o banco com objetos e começar da versão 0
      baseline-on-migrate: true
      baseline-version: 0
      locations: classpath:db/migration


# Configuração extra para o Swagger (Opcional, mas ajuda na organização)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method