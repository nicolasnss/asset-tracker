spring:
  application:
    name: asset-tracker

  datasource:
    # A URL mantém um fallback para o padrão local, mas User e Password ficam protegidos
    url: ${DB_URL:jdbc:postgresql://localhost:5432/asset_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    # Em produção (CNMP), você pode setar essa variável como 'false' para não poluir os logs
    show-sql: ${HIBERNATE_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Configuração extra para o Swagger (Opcional, mas ajuda na organização)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method